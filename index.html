<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  if(p.get('thanks')=='1'){
    var b=document.getElementById('thanks-banner');
    if(b){b.hidden=false;setTimeout(function(){b.hidden=true;},8000);}
  }
})();
var burger=document.getElementById('burgerBtn');
var menu=document.getElementById('mobileMenu');
function closeMobile(){menu.classList.remove('open');burger.classList.remove('active');}
burger.addEventListener('click',function(){this.classList.toggle('active');menu.classList.toggle('open');});
var faders=document.querySelectorAll('.fade-in');
if('IntersectionObserver' in window){
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.12});
  faders.forEach(function(el){obs.observe(el);});
}else{faders.forEach(function(el){el.classList.add('visible');});}
var form=document.getElementById('bookingForm');
if(form){
  form.querySelectorAll('input[required],textarea[required]').forEach(function(i){
    i.addEventListener('blur',function(){if(this.checkValidity()&&this.value.trim()){this.style.borderColor='#4ade80';}else if(this.value.trim()){this.style.borderColor='var(--hot-pink)';}});
    i.addEventListener('focus',function(){this.style.borderColor='var(--hot-pink)';});
  });
}
<\/script>
